<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Привет, Мир!</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            flex-direction: column;
            gap: 20px;
        }
        .hello {
            color: red;
            font-size: 3rem;
        }
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .controls label {
            font-size: 1.2rem;
        }
        .controls input[type="text"] {
            padding: 8px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div class="hello">Привет, Мир!</div>
    <div class="controls">
        <label>
            <input type="checkbox"> Чек-бокс без галочки
        </label>
        <input type="text" placeholder="Введите текст">
    </div>
</body>
</html>
